<script>

let seq=["up","down","up","down","up"];
let step=0;

window.addEventListener("deviceorientation",handle);

function handle(e){

let tilt=e.beta;

document.body.innerHTML="<h1>"+tilt+"</h1>";

if(tilt<-15 && seq[step]=="up"){
step++;
}

if(tilt>15 && seq[step]=="down"){
step++;
}

if(step===5){
location.href="final.html";
}

}

</script>
